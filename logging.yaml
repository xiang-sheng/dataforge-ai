version: 1
disable_existing_loggers: false

formatters:
  standard:
    format: "%(asctime)s [%(levelname)s] %(name)s: %(message)s"
    datefmt: "%Y-%m-%d %H:%M:%S"
  detailed:
    format: "%(asctime)s [%(levelname)s] %(name)s (%(filename)s:%(lineno)d): %(message)s"
    datefmt: "%Y-%m-%d %H:%M:%S"

handlers:
  console:
    class: logging.StreamHandler
    level: DEBUG
    formatter: standard
    stream: ext://sys.stdout
  file:
    class: logging.handlers.RotatingFileHandler
    level: INFO
    formatter: detailed
    filename: logs/dataforge.log
    maxBytes: 10485760  # 10MB
    backupCount: 5
    encoding: utf-8

loggers:
  src:
    level: DEBUG
    handlers: [console, file]
    propagate: false
  src.warehouse:
    level: DEBUG
    handlers: [console, file]
    propagate: false
  src.ai:
    level: INFO
    handlers: [console, file]
    propagate: false
  uvicorn:
    level: INFO
    handlers: [console]
    propagate: false
  sqlalchemy:
    level: WARNING
    handlers: [file]
    propagate: false

root:
  level: WARNING
  handlers: [console, file]
